services:
  app:
    build:
      context: ../..
      dockerfile: docker/php/Dockerfile
    container_name: pemiq_uat_app
    restart: unless-stopped
    env_file: .env.uat
    volumes:
      - ../../:/var/www/html
    networks:
      - pemiq_uat_network
    depends_on:
      - mariadb
      - redis

  nginx:
    image: nginx:alpine
    container_name: pemiq_uat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - pemiq_uat_network
    depends_on:
      - app

  mariadb:
    image: mariadb:11
    container_name: pemiq_uat_mariadb
    restart: unless-stopped
    env_file: .env.uat
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_uat_data:/var/lib/mysql
    networks:
      - pemiq_uat_network

  redis:
    image: redis:7-alpine
    container_name: pemiq_uat_redis
    restart: unless-stopped
    volumes:
      - redis_uat_data:/data
    networks:
      - pemiq_uat_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: pemiq_uat_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - pemiq_uat_network

  queue-worker:
    build:
      context: ../..
      dockerfile: docker/php/Dockerfile
    container_name: pemiq_uat_queue_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --backoff=5
    env_file: .env.uat
    volumes:
      - ../../:/var/www/html
    networks:
      - pemiq_uat_network
    depends_on:
      - mariadb
      - redis

  scheduler:
    build:
      context: ../..
      dockerfile: docker/php/Dockerfile
    container_name: pemiq_uat_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file: .env.uat
    volumes:
      - ../../:/var/www/html
    networks:
      - pemiq_uat_network
    depends_on:
      - mariadb
      - redis

networks:
  pemiq_uat_network:
    driver: bridge

volumes:
  mariadb_uat_data:
  redis_uat_data:
