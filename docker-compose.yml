services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pemiq_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - pemiq_network
    depends_on:
      - mariadb
      - redis

  nginx:
    image: nginx:alpine
    container_name: pemiq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pemiq_network
    depends_on:
      - app

  mariadb:
    image: mariadb:11
    container_name: pemiq_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pemiq
      MYSQL_USER: pemiq
      MYSQL_PASSWORD: pemiq
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - pemiq_network
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: pemiq_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - pemiq_network
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: pemiq_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - pemiq_network

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pemiq_queue_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --backoff=5
    volumes:
      - ./:/var/www/html
    networks:
      - pemiq_network
    depends_on:
      - mariadb
      - redis

networks:
  pemiq_network:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
